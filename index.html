<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <section>
    <div class="back-card">
      <img src="assets/images/avatar-jessica.jpeg" class="profile-pic">

      <h1 class="user-name">Jessica Randall</h1>

    <div class="london">
      <p>London, United Kingdom</p>
    </div>

    <div class="bio">
      <p>"Front-end developer and avid reader."</p>
    </div>

    <div>
      <div class="button-cover">
        <button class="buttons">Github</button>
      </div>
      <div class="button-cover">
         <button class="buttons">Frontend Mentor</button>
      </div>
      <div class="button-cover">
        <button class="buttons">LinkedIn</button>
      </div>
      <div class="button-cover">
        <button class="buttons">Twitter</button>
      </div>
      <div class="button-cover">
        <button class="buttons">Instagram</button>
      </div>
      
     
      
      
      
    </div>

    </div>
  </section>

 

  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/shaibuamade-dev">Amade Shaibu</a>.
  </footer>
</body>
</html>
